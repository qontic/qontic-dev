<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Delayed Choice (WebGL2) - Q-Ontic Lab</title>
  <meta name="description" content="Interactive Bohmian delayed-choice simulation based on a Mach-Zehnder interferometer." />
  <script>
    if (new URLSearchParams(window.location.search).get("embed") === "1") {
      document.documentElement.classList.add("is-embedded");
    }
  </script>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; font-family: system-ui, sans-serif; }
    #wrap { position:relative; width:100%; height:100%; }
    canvas { width:100%; height:100%; display:block; }
    #ui {
      position:absolute; left:12px; top:12px; width:330px;
      background:rgba(5,16,36,0.62); color:#d9e6f8; padding:12px 12px 10px;
      border:1px solid rgba(116,174,255,0.22); border-radius:10px;
      backdrop-filter: blur(6px);
      user-select:none;
      box-sizing:border-box;
      max-height:calc(100vh - 24px);
      display:flex;
      flex-direction:column;
    }
    #ui h3 { margin:0 0 8px 0; font-size:14px; font-weight:600; color:#fff; }
    #uibody { flex:1 1 auto; min-height:0; overflow-y:auto; padding-right:4px; scrollbar-width:thin; }
    .row { display:flex; align-items:center; gap:10px; margin:6px 0; }
    .row label { width:120px; font-size:12px; color:#b9cce5; }
    .row input[type="range"] { flex:1; }
    .row .val { width:76px; text-align:right; font-variant-numeric: tabular-nums; font-size:12px; color:#fff; }
    .btns { display:flex; gap:10px; margin-top:8px; }
    button {
      flex:1; padding:8px 10px; border-radius:8px; border:1px solid rgba(132,192,255,0.26);
      background:rgba(68,130,210,0.14); color:#fff; cursor:pointer;
    }
    button:hover { background:rgba(86,150,232,0.22); }
    button.selected { background:rgba(64,156,255,0.35); border-color:rgba(64,156,255,0.6); }
    .toggle-group { display:flex; gap:6px; flex:1; }
    .toggle-group button { flex:1; padding:6px 8px; font-size:11px; }
    .row.mode-row { flex-direction:column; align-items:stretch; gap:6px; }
    .row.mode-row label { width:auto; }
    .row.mode-row .val { display:none; }
    .row.mode-row .toggle-group { width:100%; }
    .row.mode-row .toggle-group button { min-width:0; white-space:normal; line-height:1.15; }
    .stat { margin-top:8px; font-size:12px; color:#bbb; line-height:1.35; }
    .stat b { color:#fff; font-weight:600; }
    #credit {
      position:absolute; right:12px; bottom:10px; z-index:10;
      color:rgba(255,255,255,0.74); background:rgba(0,0,0,0.42);
      border:1px solid rgba(255,255,255,0.14); border-radius:8px;
      padding:6px 9px; font-size:11px; line-height:1.35;
      backdrop-filter:blur(5px);
    }
    #credit a { color:#9fd0ff; text-decoration:none; }
    #credit a:hover { text-decoration:underline; }
    html.is-embedded #credit,
    html.is-embedded .applet-ui-header { display:none !important; }
    html.is-embedded #ui {
      max-height:calc(100vh - 24px);
      overflow:auto;
    }
    html.is-embedded #ui h3 { font-size:13px; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="ui">
      <div class="applet-ui-header" style="display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-bottom:8px;">
  <button id="minui" title="Minimize/expand" style="
    width:34px; height:28px; padding:0;
    border-radius:8px; border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08); color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1;
  ">v</button>
</div>
      <div id="uibody">
  <div id="controls"></div>
  <div class="btns">
    <button id="reset">Reset (R)</button>
    <button id="pause">Pause</button>
  </div>
  <div class="stat" id="stats"></div>
</div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
